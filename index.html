<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect x=%2214%22 y=%226%22 width=%2236%22 height=%2252%22 rx=%2210%22 fill=%22%23142227%22/><rect x=%2218%22 y=%2210%22 width=%2228%22 height=%2244%22 rx=%227%22 fill=%22%23f7f5ef%22/><rect x=%2226%22 y=%2230%22 width=%2212%22 height=%224%22 rx=%222%22 fill=%22%23ff8c72%22/></svg>"
    />
    <meta
      name="description"
      content="依 point 尺寸分組的 iPhone 與 iPad 螢幕尺寸一覽。"
    />
    <title>Apple 裝置尺寸圖鑑</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <div class="ambient ambient--one" aria-hidden="true"></div>
    <div class="ambient ambient--two" aria-hidden="true"></div>

    <header class="hero">
      <nav class="topbar" aria-label="頁首導覽">
        <a class="brand" href="#top" aria-label="回到頁首">
          <span class="brand__mark" aria-hidden="true">
            <span></span>
          </span>
          <span>Screen Atlas</span>
        </a>
        <a
          class="source-link"
          id="source-link"
          href="https://developer.apple.com/design/human-interface-guidelines/layout#iOS-iPadOS-device-screen-dimensions"
          target="_blank"
          rel="noreferrer"
        >
          Apple HIG
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path d="M5 11 11 5M6 5h5v5" />
          </svg>
        </a>
      </nav>

      <div class="hero__content" id="top">
        <div class="eyebrow"><span></span> iOS &amp; iPadOS</div>
        <h1>裝置尺寸<br /><em>一目瞭然。</em></h1>
        <p class="hero__intro">
          將歷代 iPhone 與 iPad 依照直向螢幕尺寸分組，快速找出共用相同版面空間的裝置。
        </p>

        <dl class="stats" aria-label="資料摘要">
          <div>
            <dt id="device-count">—</dt>
            <dd>款裝置</dd>
          </div>
          <div>
            <dt id="size-count">—</dt>
            <dd>種尺寸</dd>
          </div>
        </dl>
      </div>

      <div class="device-art" aria-hidden="true">
        <div class="device-art__tablet">
          <div class="device-art__screen">
            <span>1032</span>
            <i></i>
            <span>1376</span>
          </div>
        </div>
        <div class="device-art__phone">
          <div class="device-art__island"></div>
          <div class="device-art__glow"></div>
        </div>
      </div>
    </header>

    <main>
      <section class="catalog" aria-labelledby="catalog-title">
        <div class="catalog__heading">
          <div>
            <p class="section-number">01 / Dimensions</p>
            <h2 id="catalog-title">依尺寸分組</h2>
          </div>
          <div class="catalog__controls">
            <div class="search" role="search">
              <svg viewBox="0 0 20 20" aria-hidden="true">
                <circle cx="8.5" cy="8.5" r="5.5"></circle>
                <path d="m12.5 12.5 4 4"></path>
              </svg>
              <label class="visually-hidden" for="device-search">搜尋裝置名稱</label>
              <input
                id="device-search"
                type="search"
                placeholder="搜尋裝置名稱"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="clear-search" type="button" aria-label="清除搜尋" hidden>
                <svg viewBox="0 0 16 16" aria-hidden="true">
                  <path d="m5 5 6 6M11 5l-6 6"></path>
                </svg>
              </button>
            </div>
            <div class="filters" role="group" aria-label="依平台篩選">
              <button class="filter is-active" type="button" data-platform="all" aria-pressed="true">
                全部
              </button>
              <button class="filter" type="button" data-platform="iOS" aria-pressed="false">
                iPhone
              </button>
              <button class="filter" type="button" data-platform="iPadOS" aria-pressed="false">
                iPad
              </button>
            </div>
          </div>
        </div>

        <div class="table-shell" aria-live="polite" aria-busy="true" id="table-shell">
          <table>
            <colgroup>
              <col class="dimension-column" />
              <col />
            </colgroup>
            <thead>
              <tr>
                <th scope="col">尺寸 <span>POINT</span></th>
                <th scope="col">對應裝置</th>
              </tr>
            </thead>
            <tbody id="device-rows">
              <tr class="loading-row">
                <td colspan="2">
                  <span class="loader" aria-hidden="true"></span>
                  正在載入裝置資料…
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="error-card" id="error-card" hidden role="alert">
          <strong>無法讀取裝置資料</strong>
          <p id="error-message"></p>
        </div>

        <footer class="catalog__footer">
          <p id="updated-at">資料載入中</p>
        </footer>
      </section>
    </main>
  </body>
</html>
